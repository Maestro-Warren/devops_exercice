services:
  gateway:
    image: ${REGISTRY:-warren042}/gateway:${BUILD_NUMBER}
    build: ./api-gateway
    ports:
      - "8081:5001"
    depends_on:
      - user-service
      - product-service

  user-service:
    image: ${REGISTRY:-warren042}/user-service:${BUILD_NUMBER}
    build: ./user-service
    ports:
      - "3001:3000"

  product-service:
    image: ${REGISTRY:-warren042}/product-service:${BUILD_NUMBER}
    build: ./product-service
    ports:
      - "3002:3000"
