version: '3.8'

services:
  app:
    image: ${IMAGE_NAME}:${TAG}
    ports:
      - "80:3000"
    environment:
      - NODE_ENV=production
      - APP_VERSION=${TAG}
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'